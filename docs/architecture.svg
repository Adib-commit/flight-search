<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="660" viewBox="0 0 1040 660" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .lbl{font-size:13px;fill:#0f172a;font-weight:600}
      .sub{font-size:11px;fill:#475569}
      .edge{stroke:#475569;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
      .edgelbl{font-size:10.5px;fill:#334155}
      .title{font-size:20px;fill:#0f172a;font-weight:700}
      .grp{font-size:12px;fill:#64748b;font-weight:700}
    </style>
  </defs>

  <rect width="1040" height="660" fill="#f8fafc"/>
  <text x="28" y="40" class="title">Flight Search — Deployment Architecture</text>

  <!-- Browser -->
  <rect x="28" y="280" width="170" height="86" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.6"/>
  <text x="113" y="315" text-anchor="middle" class="lbl">Browser</text>
  <text x="113" y="335" text-anchor="middle" class="sub">static/app.js</text>
  <text x="113" y="351" text-anchor="middle" class="sub">index.html · charts</text>

  <!-- Host / uvicorn group -->
  <rect x="300" y="80" width="430" height="500" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="320" y="106" class="grp">HOST (Linux/WSL2) · systemd flight-search.service · uvicorn :8000</text>

  <!-- FastAPI -->
  <rect x="330" y="130" width="370" height="74" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.6"/>
  <text x="515" y="160" text-anchor="middle" class="lbl">FastAPI — app.main:app</text>
  <text x="515" y="180" text-anchor="middle" class="sub">/api/* JSON · / HTML · /static/* · JWT + MFA auth</text>

  <!-- search + scoring -->
  <rect x="330" y="226" width="225" height="74" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.6"/>
  <text x="442" y="256" text-anchor="middle" class="lbl">search.py · scoring.py</text>
  <text x="442" y="276" text-anchor="middle" class="sub">ValueScore ranking</text>

  <!-- MultiProvider -->
  <rect x="330" y="322" width="225" height="86" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
  <text x="442" y="352" text-anchor="middle" class="lbl">MultiProvider</text>
  <text x="442" y="370" text-anchor="middle" class="sub">asyncio.gather (parallel)</text>
  <text x="442" y="386" text-anchor="middle" class="sub">dedupe · per-provider PERF</text>

  <!-- APScheduler -->
  <rect x="330" y="430" width="370" height="74" rx="10" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.6"/>
  <text x="515" y="460" text-anchor="middle" class="lbl">APScheduler (in-process)</text>
  <text x="515" y="480" text-anchor="middle" class="sub">price watcher every 30 min · healthcheck every 10 min</text>

  <!-- Data files -->
  <rect x="575" y="226" width="125" height="86" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.6"/>
  <text x="637" y="252" text-anchor="middle" class="lbl">Local files</text>
  <text x="637" y="270" text-anchor="middle" class="sub">users.json</text>
  <text x="637" y="285" text-anchor="middle" class="sub">watches.json</text>
  <text x="637" y="300" text-anchor="middle" class="sub">logs/app.log</text>

  <!-- RapidAPI providers group -->
  <rect x="800" y="130" width="212" height="290" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="820" y="156" class="grp">RapidAPI (HTTPS)</text>

  <rect x="820" y="172" width="172" height="64" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.4"/>
  <text x="906" y="198" text-anchor="middle" class="lbl">Kiwi</text>
  <text x="906" y="216" text-anchor="middle" class="sub">~2s · fast tier</text>

  <rect x="820" y="248" width="172" height="64" rx="10" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.4"/>
  <text x="906" y="274" text-anchor="middle" class="lbl">Kayak</text>
  <text x="906" y="292" text-anchor="middle" class="sub">~3s · fast tier</text>

  <rect x="820" y="324" width="172" height="76" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="1.4"/>
  <text x="906" y="350" text-anchor="middle" class="lbl">Skyscanner</text>
  <text x="906" y="368" text-anchor="middle" class="sub">~40s cold / ~3s warm</text>
  <text x="906" y="384" text-anchor="middle" class="sub">full tier only</text>

  <!-- SMTP / email -->
  <rect x="820" y="446" width="192" height="74" rx="10" fill="#fae8ff" stroke="#c026d3" stroke-width="1.6"/>
  <text x="916" y="476" text-anchor="middle" class="lbl">SMTP → user email</text>
  <text x="916" y="496" text-anchor="middle" class="sub">price-drop alerts</text>

  <!-- Edges -->
  <!-- browser -> fastapi -->
  <path class="edge" d="M198,308 C250,300 270,210 328,180"/>
  <text x="206" y="250" class="edgelbl">POST /api/search</text>
  <text x="206" y="264" class="edgelbl">?tier=fast | full</text>

  <!-- fastapi -> search -->
  <path class="edge" d="M442,204 L442,224"/>
  <!-- search -> multiprovider -->
  <path class="edge" d="M442,300 L442,320"/>
  <!-- fastapi -> data -->
  <path class="edge" d="M620,204 C632,212 636,216 637,224"/>
  <!-- scheduler -> search -->
  <path class="edge" d="M515,430 C515,400 470,360 455,302"/>
  <text x="520" y="400" class="edgelbl">trigger search</text>
  <!-- scheduler -> data -->
  <path class="edge" d="M600,452 C640,430 642,360 640,314"/>

  <!-- multiprovider -> providers -->
  <path class="edge" d="M555,350 C690,340 720,210 818,204"/>
  <text x="600" y="332" class="edgelbl">fast tier</text>
  <path class="edge" d="M555,362 C700,362 740,290 818,280"/>
  <path class="edge" d="M555,380 C700,400 740,370 818,360"/>
  <text x="600" y="420" class="edgelbl">full tier (+Skyscanner)</text>

  <!-- scheduler -> smtp -->
  <path class="edge" d="M700,478 L818,482"/>
  <text x="720" y="470" class="edgelbl">price drop</text>
</svg>
